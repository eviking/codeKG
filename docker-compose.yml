version: "3.9"

services:

  neo4j:
    image: neo4j:5-community
    container_name: codekg-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-codekg_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - codekg

  ingestion:
    build: ./services/ingestion
    container_name: codekg-ingestion
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      REPOS_PATH: /repos
    volumes:
      - ${REPOS_PATH:-./repos}:/repos:ro
      - ./shared:/app/shared:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - codekg

  watcher:
    build: ./services/watcher
    container_name: codekg-watcher
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      INGESTION_URL: http://ingestion:8001
      REPOS_PATH: /repos
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
    volumes:
      - ${REPOS_PATH:-./repos}:/repos:ro
      - ./shared:/app/shared:ro
    depends_on:
      - ingestion
    networks:
      - codekg

  api:
    build: ./services/api
    container_name: codekg-api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - codekg

  mcp:
    build: ./services/mcp
    container_name: codekg-mcp
    environment:
      API_URL: http://api:8000
    ports:
      - "8002:8002"
    depends_on:
      - api
    networks:
      - codekg

  console:
    build: ./services/console
    container_name: codekg-console
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      API_URL: http://api:8000
    ports:
      - "8080:8080"
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      - api
    networks:
      - codekg

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  codekg:
    driver: bridge
