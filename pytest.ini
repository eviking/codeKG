[pytest]
# Run suites separately via scripts/run_tests.sh — the two services share the
# name 'main' so their PYTHONPATH settings must be kept isolated.
# Direct invocation:
#   PYTHONPATH=services/api:.          pytest services/api/tests/
#   PYTHONPATH=services/console:services/api:.  pytest services/console/tests/
addopts = -v --tb=short
