version: "3.9"

services:

  neo4j:
    image: neo4j:5-community
    container_name: codekg-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-codekg_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-2g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-4g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-2g}
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - codekg

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: codekg-ingestion
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      REPOS_PATH: /repos
    volumes:
      - ${REPOS_PATH:-./repos}:/repos
      - ${HOME_MOUNT:-/tmp/codekg-empty}:/host-home
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - codekg

  watcher:
    build:
      context: .
      dockerfile: services/watcher/Dockerfile
    container_name: codekg-watcher
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      API_URL: http://api:8000
      REPOS_PATH: /repos
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      REPOS_REGISTRY: /repos/repos.json
      INGESTION_IMAGE: codekg-ingestion
      HOME_MOUNT: ${HOME_MOUNT:-}
      HOST_REPOS_PATH: ${REPOS_PATH:-./repos}
      DOCKER_NETWORK: codekg_codekg
    volumes:
      - ${REPOS_PATH:-./repos}:/repos:ro
      - ${HOME_MOUNT:-/tmp/codekg-empty}:/host-home:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      neo4j:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - codekg

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: codekg-api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_TOKEN: ${API_TOKEN:-}
      TELEMETRY_DB: /repos/telemetry.db
      AUDIT_DB_PATH: /repos/llm_audit.db
      AGENT_INDEX_DB: /repos/agent_index.db
      REPOS_REGISTRY: /repos/repos.json
      HOST_HOME: ${HOME_MOUNT:-}
    ports:
      - "8000:8000"
    volumes:
      - ${REPOS_PATH:-./repos}:/repos
      - ${HOME_MOUNT:-/tmp/codekg-empty}:/host-home
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - codekg

  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    container_name: codekg-mcp
    command: python main.py
    environment:
      API_URL: http://api:8000
      API_TOKEN: ${API_TOKEN:-}
      CONSOLE_URL: http://console:8080
      MCP_AUDIT_DB: /repos/mcp_audit.db
      MCP_TRANSPORT: sse
      MCP_PORT: "8002"
    ports:
      - "8002:8002"
    volumes:
      - ${REPOS_PATH:-./repos}:/repos
    depends_on:
      - api
      - console
    networks:
      - codekg
    restart: unless-stopped

  console:
    build:
      context: .
      dockerfile: services/console/Dockerfile
    container_name: codekg-console
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codekg_dev}
      API_URL: http://api:8000
      API_TOKEN: ${API_TOKEN:-}
      REPOS_PATH: /repos
      REPOS_REGISTRY: /repos/repos.json
      HOST_HOME: ${HOME_MOUNT:-}
      AUDIT_DB_PATH: /repos/llm_audit.db
      MCP_AUDIT_DB: /repos/mcp_audit.db
      INGESTION_IMAGE: codekg-ingestion
      HOME_MOUNT: ${HOME_MOUNT:-}
      HOST_REPOS_PATH: ${REPOS_PATH:-./repos}
      DOCKER_NETWORK: codekg_codekg
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_TEAM: ${GITHUB_TEAM:-}
      ALLOWED_GITHUB_USERS: ${ALLOWED_GITHUB_USERS:-}
    ports:
      - "8080:8080"
    volumes:
      - ${REPOS_PATH:-./repos}:/repos
      - ${HOME_MOUNT:-/tmp/codekg-empty}:/host-home:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - api
    networks:
      - codekg

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  codekg:
    driver: bridge
