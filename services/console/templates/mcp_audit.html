{% extends "base.html" %}
{% block title %}MCP Audit{% endblock %}
{% block content %}
<style>
  .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .page-header h1 { margin: 0; }
  .last-updated { font-size: .78rem; color: var(--text-3); margin-left: auto; }
  .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: var(--success); animation: pulse 2s infinite; margin-right: .4rem; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
              padding: .9rem 1rem; text-align: center;
              flex: 1; display: flex; flex-direction: column; justify-content: center; box-shadow: var(--shadow); }
  .stat-box .sv { font-size: 1.4rem; font-weight: 700; color: var(--primary); line-height: 1; letter-spacing: -0.03em; }
  .stat-box .sl { font-size: .68rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-top: .15rem; font-weight: 500; }

  .filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: flex-end; }
  .filters input, .filters select { border-radius: var(--radius); height: 30px; padding: .3rem .65rem; font-size: .8rem; width: auto; box-sizing: border-box; }
  .filters label { font-size: .78rem; color: var(--text-2); display: flex; flex-direction: column; gap: .2rem; font-weight: 500; }
  .btn-xs { padding: 0 .65rem; font-size: .75rem; height: 30px; box-sizing: border-box; }

  .main-layout { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }

  .calls-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
  .calls-wrap table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .calls-wrap th { padding: .55rem .875rem; color: var(--text-3); font-weight: 600; font-size: .68rem; text-transform: uppercase; letter-spacing: .06em;
                   border-bottom: 1px solid var(--border); background: var(--bg); text-align: left; white-space: nowrap; }
  .calls-wrap td { padding: .5rem .875rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  .calls-wrap tr:last-child td { border: none; }
  .calls-wrap tr.clickable:hover td { background: var(--primary-lt); cursor: pointer; }
  .calls-wrap tr.selected td { background: var(--primary-lt); }

  .tag { display: inline-block; padding: .15rem .5rem; border-radius: 20px; font-size: .7rem; font-weight: 600; }
  .tag-ok   { background: var(--success-lt); color: var(--success);  border: 1px solid #86efac; }
  .tag-err  { background: var(--danger-lt);  color: var(--danger);   border: 1px solid #fca5a5; }
  .tag-tool { background: var(--primary-lt); color: var(--primary);  border: 1px solid #c7d2fe; font-family: 'JetBrains Mono', monospace; }
  .tag-sess { background: var(--surface-2);  color: var(--text-3);   border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: .68rem; }

  tr.detail-tr td { padding: 0; border-bottom: 2px solid var(--primary); }
  .detail-inner { padding: 1rem 1.25rem; background: var(--bg); }
  .detail-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .25rem 2rem; margin-bottom: .5rem; }
  .detail-row { display: flex; flex-direction: column; gap: .15rem; margin-bottom: .6rem; }
  .detail-row .dk { font-size: .7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .detail-row .dv { font-size: .82rem; color: var(--text); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
  .detail-section { margin-top: .9rem; padding-top: .75rem; border-top: 1px solid var(--border); }
  .detail-section h4 { font-size: .72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; font-weight: 600; }
  pre.detail-pre { border-radius: var(--radius); padding: .65rem; font-size: .72rem; white-space: pre-wrap; word-break: break-all; margin: 0; overflow-y: auto; max-height: 280px; }
  pre.detail-pre.scrollable { max-height: 280px; overflow-y: auto; }

  .sessions-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-top: 1.25rem; box-shadow: var(--shadow); }
  .sessions-card h3 { font-size: .72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; font-weight: 600; }
  .session-row { display: flex; flex-direction: column; gap: .2rem; padding: .55rem 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .session-row:last-child { border: none; }
  .session-row:hover { background: var(--primary-lt); margin: 0 -.5rem; padding-left: .5rem; padding-right: .5rem; border-radius: var(--radius); }
  .session-row .sid { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--primary); }
  .session-row .smeta { font-size: .72rem; color: var(--text-3); display: flex; gap: .75rem; flex-wrap: wrap; }
  .session-row .smeta span { display: flex; align-items: center; gap: .2rem; }

  .tool-bar { display: flex; align-items: center; gap: .4rem; margin-bottom: .3rem; font-size: .75rem; }
  .tool-bar .tname { color: var(--primary); font-family: 'JetBrains Mono', monospace; min-width: 120px; }
  .tool-bar .tcount { color: var(--text); min-width: 22px; text-align: right; flex-shrink: 0; font-weight: 600; }
  .tool-bar .ttok  { color: var(--purple); font-size: .68rem; min-width: 44px; text-align: right; flex-shrink: 0; }
  .tool-bar .tbar-wrap { flex: 1; background: var(--surface-2); border-radius: 2px; height: 5px; min-width: 40px; }
  .tool-bar .tbar-fill { background: var(--primary); height: 100%; border-radius: 2px; }
  .tool-bar .terr { color: var(--danger); font-size: .68rem; flex-shrink: 0; }

  .savings-grid { display: grid; grid-template-columns: auto 1fr 1fr auto; align-items: center;
                  gap: .3rem .75rem; font-size: .72rem; padding: .4rem .6rem;
                  background: var(--success-lt); border: 1px solid #86efac; border-radius: var(--radius); margin-bottom: .5rem; }
  .savings-grid .sg-label { color: var(--success); font-weight: 600; grid-column: 1; }
  .savings-grid .sg-in    { color: var(--success); text-align: right; }
  .savings-grid .sg-out   { color: var(--success); text-align: right; }
  .savings-grid .sg-meta  { color: #166534; font-size: .68rem; }
  .savings-grid .sg-note  { color: #166534; font-size: .68rem; text-align: right; grid-column: 4; }

  .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: .6rem; margin-bottom: 1.25rem; }
  .score-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: .65rem .75rem; text-align: center; }
  .score-box .sv { font-size: 1.5rem; font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
  .score-box .sl { font-size: .68rem; color: var(--text-3); margin-top: .2rem; text-transform: uppercase; font-weight: 500; }

  .timeline { display: flex; flex-direction: column; gap: .3rem; margin-top: .75rem; }
  .tl-item { display: flex; align-items: flex-start; gap: .6rem; font-size: .78rem; }
  .tl-num  { color: var(--text-3); min-width: 22px; text-align: right; font-family: 'JetBrains Mono', monospace; padding-top: .1rem; }
  .tl-dot  { width: 8px; height: 8px; border-radius: 50%; margin-top: .3rem; flex-shrink: 0; }
  .tl-body { flex: 1; }
  .tl-tool { font-weight: 600; font-size: .75rem; color: var(--text); }
  .tl-sum  { color: var(--text-3); font-size: .72rem; margin-top: .1rem; word-break: break-all; font-family: 'JetBrains Mono', monospace; }

  .dot-codekg { background: var(--primary); }
  .dot-read   { background: var(--info); }
  .dot-bash   { background: var(--warning); }
  .dot-edit   { background: var(--success); }
  .dot-search { background: #06b6d4; }
  .dot-other  { background: var(--text-3); }

  .tl-item.tl-highlight {
    background: var(--primary-lt);
    border: 1px solid #c7d2fe;
    border-radius: var(--radius);
    padding: .35rem .5rem;
    margin: .1rem -.5rem;
  }
  .tl-highlight .tl-tool::after {
    content: ' ← this call';
    color: var(--primary);
    font-size: .68rem;
    font-weight: 400;
  }

  .prompt-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
                padding: .75rem 1rem; font-size: .82rem; color: var(--text-2); margin-bottom: 1rem; font-style: italic; }

  .eff-badge { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .6rem; border-radius: 20px; font-size: .72rem; font-weight: 600; }
  .eff-good { background: var(--success-lt); color: var(--success); border: 1px solid #86efac; }
  .eff-warn { background: var(--warning-lt); color: var(--warning); border: 1px solid #fcd34d; }
  .eff-bad  { background: var(--danger-lt);  color: var(--danger);  border: 1px solid #fca5a5; }

  .section-hdr { font-size: .72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin: 1rem 0 .5rem; font-weight: 600; }

  .no-transcript { color: var(--text-3); font-size: .82rem; padding: 1.5rem; text-align: center; }
</style>

<div class="page-header">
  <h1>MCP Audit Trail</h1>
  <span style="display:flex;align-items:center;gap:0.6rem">
    <span class="last-updated" id="last-updated">Loading…</span>
    <button onclick="load();loadSessionAnalysis()" id="refresh-btn"
      style="padding:0.25rem 0.8rem;font-size:0.75rem;border-radius:20px;background:var(--surface);
             color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-family:inherit;
             font-weight:500;transition:all .15s"
      onmouseover="this.style.background='var(--primary)';this.style.color='#fff';this.style.borderColor='var(--primary)'"
      onmouseout="this.style.background='var(--surface)';this.style.color='var(--text-2)';this.style.borderColor='var(--border)'">
      ↻ Refresh
    </button>
  </span>
</div>

<!-- Filters -->
<div class="filters">
  <label>Session <input id="f-session" placeholder="session id…" style="width:100px"></label>
  <label>Tool
    <select id="f-tool">
      <option value="">all tools</option>
      <option>get_class</option><option>search_classes</option><option>answer_question</option>
      <option>get_module_context</option><option>get_class_context</option>
      <option>get_codebase_template</option><option>get_change_impact</option>
      <option>get_arch_patterns</option><option>check_violations</option>
      <option>get_repo_summary</option><option>list_arch_policies</option>
    </select>
  </label>
  <label>Status
    <select id="f-status">
      <option value="">all</option><option value="ok">ok</option><option value="error">error</option>
    </select>
  </label>
  <label>Period
    <select id="f-since" onchange="load()">
      <option value="today">Today</option>
      <option value="24h" selected>Last 24 h</option>
      <option value="7d">Last 7 days</option>
      <option value="all">All time</option>
    </select>
  </label>
  <label>Limit
    <select id="f-limit">
      <option value="100">100</option><option value="200" selected>200</option>
      <option value="500">500</option><option value="1000">1000</option>
    </select>
  </label>
  <label style="visibility:hidden">x<button class="btn btn-xs" onclick="load()" style="visibility:visible">Apply</button></label>
  <label style="visibility:hidden">x<button class="btn btn-xs btn-ghost" onclick="clearFilters()" style="visibility:visible">Clear</button></label>
</div>

<!-- Main layout -->
<div class="main-layout">

  <!-- Stats + tool breakdown — spans both columns -->
  <div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(8,1fr);gap:1rem;margin-bottom:.25rem">
    <div class="stat-box"><div class="sv" id="sv-calls">—</div><div class="sl">Calls (24h)</div></div>
    <div class="stat-box"><div class="sv" id="sv-sessions">—</div><div class="sl">Sessions (24h)</div></div>
    <div class="stat-box"><div class="sv" id="sv-errors">—</div><div class="sl">Errors (24h)</div></div>
    <div class="stat-box"><div class="sv" id="sv-avgms">—</div><div class="sl">Avg ms (24h)</div></div>
    <div class="stat-box"><div class="sv" id="sv-maxms">—</div><div class="sl">Max ms (24h)</div></div>
    <div class="stat-box" style="align-items:flex-start;text-align:left;justify-content:flex-start">
      <div class="sl" style="margin-bottom:.4rem">Tool Breakdown</div>
      <div id="tool-breakdown"><div style="color:var(--text-3);font-size:.78rem">Loading…</div></div>
    </div>
  </div>

  <!-- Calls table -->
  <div>
    <div class="calls-wrap" id="calls-wrap">
      <table><thead><tr>
        <th>Time</th><th>Session</th><th>Req ID</th><th>Tool</th><th>Args</th>
        <th>~In tok</th><th>~Out tok</th><th>Size</th><th>ms</th><th>Status</th>
      </tr></thead>
      <tbody id="calls-tbody"><tr><td colspan="7" style="color:var(--text-3);padding:2rem;text-align:center">Loading…</td></tr></tbody>
    </table>
  </div>

</div>

<div id="sessions-list" style="display:none"></div>

<script>
let _data = null;

function fmtTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString() + ' ' + d.toLocaleDateString(undefined, {month:'short',day:'numeric'});
}
function fmtSize(b) {
  if (!b) return '—';
  if (b >= 1048576) return (b/1048576).toFixed(1)+'MB';
  if (b >= 1024) return (b/1024).toFixed(0)+'KB';
  return b+'B';
}
function argSummary(args) {
  if (!args) return '—';
  try {
    const o = JSON.parse(args);
    const vals = Object.values(o).map(v => String(v).slice(0,40));
    return vals.join(', ').slice(0, 60) + (vals.join(', ').length > 60 ? '…' : '');
  } catch { return String(args).slice(0,60); }
}

function fmtTok(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n;
}
function renderStats(stats) {
  const errs = stats.total_errors || 0;
  document.getElementById('sv-calls').textContent    = stats.total_calls    || 0;
  document.getElementById('sv-sessions').textContent = stats.total_sessions || 0;
  document.getElementById('sv-errors').textContent   = errs;
  document.getElementById('sv-errors').style.color   = errs > 0 ? 'var(--danger)' : 'var(--success)';
  document.getElementById('sv-avgms').textContent    = stats.avg_ms || 0;
  document.getElementById('sv-maxms').textContent    = stats.max_ms || 0;
}

function renderCalls(calls) {
  if (!calls.length) {
    document.getElementById('calls-tbody').innerHTML =
      '<tr><td colspan="10" style="color:var(--text-3);padding:2rem;text-align:center">No calls found</td></tr>';
    return;
  }

  // calls arrive newest-first — reverse so groups are oldest-first within session
  const ordered = [...calls].reverse();

  // Group: session → turn → calls
  const sessionMap = new Map();
  ordered.forEach(c => {
    const sid = c.session_id || '?';
    const tid = c.turn_id   || '__noturn__';
    if (!sessionMap.has(sid)) sessionMap.set(sid, new Map());
    const turnMap = sessionMap.get(sid);
    if (!turnMap.has(tid)) turnMap.set(tid, []);
    turnMap.get(tid).push(c);
  });

  // Order sessions newest-first
  const sessions = [...sessionMap.entries()].sort((a, b) => {
    const latest = m => Math.max(...[...m.values()].flat().map(c => new Date(c.ts).getTime()));
    return latest(b[1]) - latest(a[1]);
  });

  const SESSION_BG = 'var(--bg)';
  const TURN_BG    = 'var(--primary-lt)';
  const ROW_BG     = 'var(--surface)';

  let rows = '';
  sessions.forEach(([sid, turnMap]) => {
    const allCalls = [...turnMap.values()].flat();
    const errCount = allCalls.filter(c => c.status !== 'ok').length;

    // Session header
    rows += `<tr style="background:${SESSION_BG};border-top:2px solid #2d3748">
      <td colspan="10" style="padding:.3rem .75rem;font-size:.72rem;color:#64748b">
        <span style="font-family:monospace;color:#60a5fa">${sid}</span>
        <span style="margin-left:.75rem">${allCalls.length} call${allCalls.length>1?'s':''}</span>
        <span style="margin-left:.5rem;color:var(--text-3)">${fmtTs(allCalls[0].ts)} → ${fmtTs(allCalls[allCalls.length-1].ts)}</span>
        ${errCount > 0 ? `<span style="margin-left:.5rem;color:#f87171">${errCount} err</span>` : ''}
      </td>
    </tr>`;

    // Turn sub-groups within session
    turnMap.forEach((tcalls, tid) => {
      const turnData = tid !== '__noturn__' ? (_analysedSessions[tid] || null) : null;
      const prompt   = turnData?.transcript?.user_prompt || '';
      const turnErr  = tcalls.filter(c => c.status !== 'ok').length;

      if (tid !== '__noturn__') {
        rows += `<tr style="background:${TURN_BG};border-top:1px solid #1e2533">
          <td colspan="10" style="padding:.25rem .75rem .25rem 2rem;font-size:.7rem;color:#475569">
            <span style="color:#334155;margin-right:.5rem">↳ turn</span>
            <span style="font-family:monospace;color:#475569;font-size:.65rem">${tid}</span>
            ${prompt ? `<span style="margin-left:.75rem;color:#94a3b8;font-style:italic;max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom">${escHtml(prompt.slice(0, 120))}</span>` : ''}
            <span style="margin-left:.5rem;color:#334155">${tcalls.length} call${tcalls.length>1?'s':''}</span>
            ${turnErr > 0 ? `<span style="margin-left:.4rem;color:#f87171">${turnErr} err</span>` : ''}
          </td>
        </tr>`;
      }

      tcalls.forEach(c => {
        rows += `<tr class="clickable" onclick="showDetail(${c.id})" data-id="${c.id}" style="background:${ROW_BG}">
          <td style="white-space:nowrap;color:#64748b;font-size:.72rem;padding-left:${tid !== '__noturn__' ? '2.5' : '1.5'}rem">${fmtTs(c.ts)}</td>
          <td style="color:var(--text-3);font-size:.68rem;font-family:monospace">—</td>
          <td style="color:#64748b;font-family:monospace;font-size:.7rem">${c.request_id||'—'}</td>
          <td><span class="tag tag-tool">${c.tool}</span></td>
          <td style="color:#94a3b8;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${argSummary(c.arguments)}</td>
          <td style="color:#64748b">${fmtSize(c.response_size)}</td>
          <td style="color:${c.elapsed_ms>3000?'#f87171':c.elapsed_ms>1000?'#fbbf24':'#94a3b8'}">${Math.round(c.elapsed_ms||0)}</td>
          <td>${c.status==='ok'?'<span class="tag tag-ok">ok</span>':'<span class="tag tag-err">err</span>'}</td>
        </tr>`;
      });
    });
  });

  document.getElementById('calls-tbody').innerHTML = rows;

  // Re-insert the open detail row if one was open before the refresh
  if (_openDetailId !== null) {
    const anchor = document.querySelector(`tr[data-id="${_openDetailId}"]`);
    const existing = document.getElementById(`detail-row-${_openDetailId}`);
    if (anchor && !existing) {
      anchor.classList.add('selected');
      anchor.insertAdjacentElement('afterend', _openDetailRowEl);
    } else if (!anchor) {
      // Row no longer in the table (filtered out) — clear state
      _openDetailId = null;
      _openDetailRowEl = null;
    }
  }
}

function renderSessions(sessions) {
  if (!sessions.length) {
    document.getElementById('sessions-list').innerHTML = '<div style="color:var(--text-3);font-size:.8rem">No sessions yet</div>';
    return;
  }
  document.getElementById('sessions-list').innerHTML = sessions.map(s => `
    <div class="session-row" onclick="filterBySession('${s.session_id}')">
      <div class="sid">${s.session_id}</div>
      <div class="smeta">
        <span>🖥 ${s.client||'unknown'}</span>
        <span>📞 ${s.call_count} calls</span>
        ${s.error_count > 0 ? `<span style="color:#f87171">⚠ ${s.error_count} err</span>` : ''}
        <span style="color:var(--text-3)">${fmtTs(s.started_at)}</span>
      </div>
    </div>
  `).join('');
}

function renderToolBreakdown(tools) {
  if (!tools.length) { document.getElementById('tool-breakdown').innerHTML = '<div style="color:var(--text-3);font-size:.8rem">No data</div>'; return; }
  document.getElementById('tool-breakdown').innerHTML = tools.map(t => {
    const ok = t.n - (t.errors || 0);
    return `<div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;padding:.1rem 0">
      <span style="color:#a5b4fc;font-family:monospace">${t.tool}</span>
      <span style="color:#4ade80">${ok}✓</span>
      ${t.errors > 0 ? `<span style="color:#f87171">${t.errors}✗</span>` : ''}
    </div>`;
  }).join('');
}

let _openDetailId = null;
let _openDetailRowEl = null;

function _closeOpenDetail() {
  if (_openDetailId !== null) {
    document.querySelector(`tr[data-id="${_openDetailId}"]`)?.classList.remove('selected');
    _openDetailRowEl?.remove();
    _openDetailId = null;
    _openDetailRowEl = null;
  }
}

async function showDetail(id) {
  if (_openDetailId === id) { _closeOpenDetail(); return; }
  _closeOpenDetail();

  const clickedRow = document.querySelector(`tr[data-id="${id}"]`);
  if (!clickedRow) return;
  clickedRow.classList.add('selected');
  _openDetailId = id;

  const colCount = clickedRow.cells.length;
  const detailRow = document.createElement('tr');
  detailRow.id = `detail-row-${id}`;
  detailRow.className = 'detail-tr';
  detailRow.innerHTML = `<td colspan="${colCount}"><div class="detail-inner" style="color:var(--text-3);font-size:.8rem;padding:1rem">Loading…</div></td>`;
  _openDetailRowEl = detailRow;
  clickedRow.insertAdjacentElement('afterend', detailRow);

  try {
    const r = await fetch(`/api/mcp-audit/call/${id}`);
    const c = await r.json();

    let argsFormatted = '—';
    try { argsFormatted = JSON.stringify(JSON.parse(c.arguments||'{}'), null, 2); } catch {}

    // --- Session transcript section ---
    // Match by turn_id (one human turn) first, fall back to session_id
    const sessionData = (c.turn_id && _analysedSessions[c.turn_id])
                        || _analysedSessions[c.session_id];
    const tr = sessionData && sessionData.transcript;
    let transcriptHtml = '';

    if (tr && tr.turns && tr.turns.length) {
      // Find which turn(s) correspond to this MCP call.
      // Match by: tool name ends with c.tool AND timestamp within 60s of c.ts
      const callTs = c.ts ? new Date(c.ts).getTime() : null;
      let highlightIdx = -1;
      if (callTs) {
        let bestDiff = Infinity;
        tr.turns.forEach((t, i) => {
          // The tool in the transcript may be "mcp__codekg__answer_question",
          // c.tool is "answer_question" — match by suffix
          const toolMatch = t.tool === c.tool || t.tool.endsWith('__' + c.tool) || t.tool === 'mcp__codekg__' + c.tool;
          if (toolMatch && t.ts) {
            const diff = Math.abs(new Date(t.ts).getTime() - callTs);
            if (diff < bestDiff && diff < 60000) {
              bestDiff = diff;
              highlightIdx = i;
            }
          }
        });
      }

      // Efficiency verdict
      let verdict = '', verdictCls = 'eff-warn';
      if (tr.total_codekg === 0) {
        verdict = 'CodeKG not used'; verdictCls = 'eff-bad';
      } else if (tr.codekg_first && tr.reads_after_codekg <= 2) {
        verdict = 'KG-first ✓'; verdictCls = 'eff-good';
      } else if (tr.reads_before_codekg > 3) {
        verdict = `${tr.reads_before_codekg} reads before KG`; verdictCls = 'eff-warn';
      } else {
        verdict = 'KG used'; verdictCls = 'eff-good';
      }

      // Use the focused loop slice if available, fall back to full turns
      const loopTurns  = (tr.codekg_loop_turns && tr.codekg_loop_turns.length)
                         ? tr.codekg_loop_turns : tr.turns;
      const loopPrompt = tr.codekg_loop_prompt || tr.user_prompt || '';

      // Re-find highlight index within the loop slice
      let loopHighlightIdx = -1;
      if (callTs) {
        let bestDiff = Infinity;
        loopTurns.forEach((t, i) => {
          const toolMatch = t.tool === c.tool || t.tool.endsWith('__' + c.tool) || t.tool === 'mcp__codekg__' + c.tool;
          if (toolMatch && t.ts) {
            const diff = Math.abs(new Date(t.ts).getTime() - callTs);
            if (diff < bestDiff && diff < 60000) { bestDiff = diff; loopHighlightIdx = i; }
          }
        });
      }

      // Build timeline from loop turns only
      const timelineItems = loopTurns.map((t, i) => {
        const col = CAT_COLORS[t.cat] || '#4a5568';
        const toolShort = t.tool.replace('mcp__codekg__','').replace('mcp__','');
        const isMcp = t.cat === 'codekg';
        const isHighlight = i === loopHighlightIdx;
        return `
        <div class="tl-item${isHighlight ? ' tl-highlight' : ''}" id="tl-${id}-${i}">
          <span class="tl-num">${i+1}</span>
          <span class="tl-dot" style="background:${col}"></span>
          <div class="tl-body">
            <div class="tl-tool" style="color:${col}">${isMcp ? '⬡ ' : ''}${escHtml(toolShort)}
              <span style="color:var(--text-3);font-weight:400;font-size:.68rem">${t.ts ? new Date(t.ts).toLocaleTimeString() : ''}</span>
            </div>
            ${t.summary ? `<div class="tl-sum">${escHtml(t.summary.slice(0,120))}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      const loopLabel = tr.codekg_loop_turns && tr.codekg_loop_turns.length
        ? `${loopTurns.length} steps in this request`
        : `${tr.total_turns} total turns`;

      transcriptHtml = `
      <div class="detail-section">
        <h4 style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          Agent loop for this request
          <span class="eff-badge ${verdictCls}" style="font-size:.65rem">${verdict}</span>
          <span style="color:var(--text-3);font-size:.68rem;margin-left:auto">${loopLabel}</span>
        </h4>
        ${loopPrompt ? `<div style="font-size:.72rem;color:#94a3b8;margin-bottom:.6rem;padding:.4rem .6rem;background:#0f1117;border-left:2px solid #6366f1;border-radius:0 4px 4px 0">"${escHtml(loopPrompt.slice(0,300))}"</div>` : ''}
        <div class="timeline" style="max-height:340px;overflow-y:auto;padding:.25rem .5rem" id="tl-container-${id}">
          ${timelineItems}
        </div>
        <div style="margin-top:.4rem;font-size:.68rem;color:var(--text-3)">${tr.transcript_file}</div>
      </div>`;

      // Scroll the highlighted item into view
      if (loopHighlightIdx >= 0) {
        setTimeout(() => {
          const el = document.getElementById(`tl-${id}-${loopHighlightIdx}`);
          const container = document.getElementById(`tl-container-${id}`);
          if (el && container) {
            container.scrollTop = el.offsetTop - container.offsetTop - 60;
          }
        }, 50);
      }
    } else if (sessionData) {
      transcriptHtml = `
      <div class="detail-section">
        <h4>Session Transcript</h4>
        <div style="color:var(--text-3);font-size:.78rem">No matching Claude Code transcript found for session <code>${c.session_id}</code>.</div>
      </div>`;
    }

    detailRow.querySelector('.detail-inner').innerHTML = `
      <div class="detail-fields">
        <div class="detail-row"><div class="dk">Tool</div><div class="dv"><span class="tag tag-tool">${c.tool}</span></div></div>
        <div class="detail-row"><div class="dk">Status</div><div class="dv">${c.status==='ok'?'<span class="tag tag-ok">ok</span>':'<span class="tag tag-err">error</span>'}</div></div>
        <div class="detail-row"><div class="dk">Time</div><div class="dv">${fmtTs(c.ts)}</div></div>
        <div class="detail-row"><div class="dk">Session</div><div class="dv">
          <span style="font-family:monospace">${c.session_id}</span>
          <span style="color:#64748b;font-size:.7rem"> (${c.session_client||'?'})</span>
        </div></div>
        <div class="detail-row"><div class="dk">Request ID</div><div class="dv" style="font-family:monospace">${c.request_id||'—'}</div></div>
        <div class="detail-row"><div class="dk">Elapsed</div><div class="dv">${Math.round(c.elapsed_ms||0)} ms</div></div>
        <div class="detail-row"><div class="dk">Response size</div><div class="dv">${fmtSize(c.response_size)}</div></div>
        ${c.error ? `<div class="detail-row"><div class="dk">Error</div><div class="dv" style="color:#f87171">${c.error}</div></div>` : ''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.75rem">
        <div class="detail-section" style="margin-top:0;padding-top:0;border-top:none">
          <h4>Arguments</h4>
          <pre class="detail-pre">${escHtml(argsFormatted)}</pre>
        </div>
        <div class="detail-section" style="margin-top:0;padding-top:0;border-top:none">
          <h4>Response <span style="color:var(--text-3);font-weight:400;text-transform:none;letter-spacing:0">${fmtSize(c.response_size)}</span></h4>
          <pre class="detail-pre scrollable">${escHtml(c.response_preview||'(empty)')}</pre>
        </div>
      </div>
      ${transcriptHtml}
      ${_renderLearnings(sessionData)}
    `;
  } catch(e) {
    detailRow.querySelector('.detail-inner').innerHTML = `<div style="color:#f87171;padding:1rem">Failed to load: ${e.message}</div>`;
  }
}

function _renderLearnings(sessionData) {
  const learnings = sessionData && sessionData.learnings;
  if (!learnings || !learnings.length) return '';
  const SCOPE_COLOR = { method: '#a78bfa', class: '#60a5fa', module: '#34d399', system: '#f97316' };
  const rows = learnings.map(l => {
    const scope      = l.scope || 'class';
    const color      = SCOPE_COLOR[scope] || '#9ca3af';
    const pct        = Math.round((l.confidence || 0.7) * 100);
    const staleness  = l.staleness || 0;
    const staleWarn  = staleness > 0.3
      ? `<span style="color:#f87171;margin-left:.4rem" title="Staleness ${Math.round(staleness*100)}% — code may have changed">⚠ possibly stale</span>`
      : '';
    return `
      <div style="padding:.5rem 0;border-bottom:1px solid #1e293b">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
          <span style="background:${color}22;color:${color};padding:.1rem .4rem;border-radius:.25rem;font-size:.7rem;font-weight:600;text-transform:uppercase">${escHtml(scope)}</span>
          <code style="color:#94a3b8;font-size:.75rem">${escHtml(l.applies_to || '')}</code>
          <span style="color:var(--text-3);font-size:.7rem;margin-left:auto">confidence ${pct}%${staleWarn ? '' : ''}</span>
          ${staleWarn}
        </div>
        <div style="color:#e2e8f0;font-size:.82rem;line-height:1.5">${escHtml(l.insight || '')}</div>
      </div>`;
  }).join('');
  return `
    <div class="detail-section" style="margin-top:.5rem">
      <h4 style="color:var(--purple)">Tribal Knowledge <span style="color:var(--text-3);font-weight:400;font-size:.75rem">${learnings.length} insight${learnings.length > 1 ? 's' : ''} captured this session</span></h4>
      <div style="font-size:.75rem;color:#64748b;margin-bottom:.5rem">Non-obvious facts discovered during this session — stored in the KG and surfaced in future answers.</div>
      ${rows}
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterBySession(sid) {
  document.getElementById('f-session').value = sid;
  load();
}

function clearFilters() {
  document.getElementById('f-session').value = '';
  document.getElementById('f-tool').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-since').value = '24h';
  load();
}

function sinceParam() {
  const val = document.getElementById('f-since').value;
  const now = new Date();
  if (val === 'today') {
    // Start of today in UTC
    const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
    return d.toISOString().replace('T', ' ').slice(0, 19);
  }
  if (val === '24h') {
    const d = new Date(now.getTime() - 24 * 60 * 60 * 1000);
    return d.toISOString().replace('T', ' ').slice(0, 19);
  }
  if (val === '7d') {
    const d = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
    return d.toISOString().replace('T', ' ').slice(0, 19);
  }
  return ''; // all time — no filter
}

async function load() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Loading…'; }
  const params = new URLSearchParams({
    limit: document.getElementById('f-limit').value,
    session_id: document.getElementById('f-session').value,
    tool: document.getElementById('f-tool').value,
    status: document.getElementById('f-status').value,
    since: sinceParam(),
  });

  try {
    const r = await fetch('/api/mcp-audit?' + params);
    const data = await r.json();
    _data = data;

    if (data.error) {
      document.getElementById('calls-tbody').innerHTML =
        `<tr><td colspan="7" style="color:#f87171;padding:2rem;text-align:center">${data.error}</td></tr>`;
      document.getElementById('last-updated').textContent = 'DB not found — make sure MCP has run at least once';
      return;
    }

    renderStats(data.stats || {});
    renderCalls(data.calls || []);
    renderSessions(data.sessions || []);
    renderToolBreakdown(data.tool_breakdown || []);

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('last-updated').textContent = 'Error: ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
  }
}

// ── Session analysis ─────────────────────────────────────────────────────────

let _analysedSessions = {};

async function loadSessionAnalysis() {
  try {
    const r = await fetch('/api/mcp-audit/sessions/analysed');
    const sessions = await r.json();
    _analysedSessions = {};
    for (const s of sessions) {
      // Key by turn_id (precise) when available, fall back to session_id
      const key = s.turn_id || s.session_id;
      _analysedSessions[key] = s;
      // Also index by session_id for the sessions sidebar
      if (!_analysedSessions[s.session_id]) _analysedSessions[s.session_id] = s;
    }
    // Re-render sessions panel with analysis data
    renderSessionsEnriched(sessions);
    // Re-render calls table so turn headers pick up user_prompt from analysis
    if (_data && _data.calls) renderCalls(_data.calls);
  } catch(e) {
    console.warn('Session analysis load failed:', e);
  }
}

function renderSessionsEnriched(sessions) {
  if (!sessions || !sessions.length) return;
  document.getElementById('sessions-list').innerHTML = sessions.map(s => {
    const tr = s.transcript;
    let effBadge = '';
    if (tr) {
      if (tr.codekg_first && tr.reads_after_codekg <= 3) {
        effBadge = '<span class="eff-badge eff-good">✓ KG-first</span>';
      } else if (tr.total_codekg > 0 && tr.reads_before_codekg === 0) {
        effBadge = '<span class="eff-badge eff-good">✓ KG used</span>';
      } else if (tr.total_codekg === 0) {
        effBadge = '<span class="eff-badge eff-bad">✗ No KG</span>';
      } else {
        effBadge = '<span class="eff-badge eff-warn">~ Mixed</span>';
      }
    }
    const hasTranscript = tr && tr.turns && tr.turns.length > 0;
    return `
    <div class="session-row" onclick="filterBySession('${s.session_id}')">
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="sid">${s.session_id}</span>
        ${effBadge}
        ${hasTranscript ? '<span style="color:var(--text-3);font-size:.68rem">🔍 click to filter</span>' : ''}
      </div>
      <div class="smeta">
        <span>🖥 ${s.client||'unknown'}</span>
        <span>📞 ${s.call_count} calls</span>
        ${s.error_count > 0 ? `<span style="color:#f87171">⚠ ${s.error_count} err</span>` : ''}
        ${tr ? `<span style="color:#64748b">${tr.total_turns} tool calls</span>` : ''}
        <span style="color:var(--text-3)">${fmtTs(s.started_at)}</span>
      </div>
      ${tr && tr.user_prompt ? `<div style="font-size:.72rem;color:#64748b;margin-top:.2rem;font-style:italic">"${tr.user_prompt.slice(0,80)}…"</div>` : ''}
    </div>`;
  }).join('');
}

const CAT_COLORS = {
  codekg: '#6366f1', read: '#3b82f6', bash: '#f59e0b',
  edit: '#22c55e', search: '#06b6d4', toolsearch: '#94a3b8', other: '#4a5568'
};
const CAT_LABELS = {
  codekg: 'CodeKG', read: 'Read', bash: 'Bash',
  edit: 'Edit/Write', search: 'Search', toolsearch: 'ToolSearch', other: 'Other'
};


load();
loadSessionAnalysis();
</script>
{% endblock %}
